name: Run OpenAI Information to Discord

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分
  workflow_dispatch:

jobs:
  run-main:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run main.py
        id: run_youtube
        continue-on-error: true
        env:
          FEED_URL: https://www.youtube.com/feeds/videos.xml?channel_id=UCXZCJLdBC09xxGZ6gcdrc6A
          WEBHOOK_URL: ${{ secrets.DISCORD_OPENAI_WEBHOOK_URL }}
          TRANSLATE: true
          NAME: OpenAI
          FETCH_MODE: hours
          HOURS: 1
          DIFF_DAYS: 1
        run: |
          max_retries=3
          attempt=1

          while [ $attempt -le $max_retries ]; do
            echo "[YouTube] Attempt ${attempt}/${max_retries}"

            if python main.py "$FEED_URL" "$WEBHOOK_URL" "$TRANSLATE" "$NAME" "$FETCH_MODE" "$HOURS" "$DIFF_DAYS"; then
              echo "[YouTube] Succeeded on attempt ${attempt}."
              exit 0
            fi

            if [ $attempt -lt $max_retries ]; then
              echo "[YouTube] Failed on attempt ${attempt}. Retrying..."
              sleep 5
            fi

            attempt=$((attempt + 1))
          done

          echo "[YouTube] Failed after ${max_retries} attempts."
          exit 1

      - name: Run main.py (alternate FEED_URL)
        id: run_openai
        continue-on-error: true
        env:
          FEED_URL: https://openai.com/news/rss.xml
          WEBHOOK_URL: ${{ secrets.DISCORD_OPENAI_WEBHOOK_URL }}
          TRANSLATE: true
          NAME: OpenAI
          FETCH_MODE: hours
          HOURS: 1
          DIFF_DAYS: 1
        run: |
          max_retries=3
          attempt=1

          while [ $attempt -le $max_retries ]; do
            echo "[OpenAI RSS] Attempt ${attempt}/${max_retries}"

            if python main.py "$FEED_URL" "$WEBHOOK_URL" "$TRANSLATE" "$NAME" "$FETCH_MODE" "$HOURS" "$DIFF_DAYS"; then
              echo "[OpenAI RSS] Succeeded on attempt ${attempt}."
              exit 0
            fi

            if [ $attempt -lt $max_retries ]; then
              echo "[OpenAI RSS] Failed on attempt ${attempt}. Retrying..."
              sleep 5
            fi

            attempt=$((attempt + 1))
          done

          echo "[OpenAI RSS] Failed after ${max_retries} attempts."
          exit 1

      - name: Finalize result
        if: always()
        run: |
          echo "run_youtube outcome: ${{ steps.run_youtube.outcome }}"
          echo "run_openai  outcome: ${{ steps.run_openai.outcome }}"

          failed=0
          [ "${{ steps.run_youtube.outcome }}" = "failure" ] && failed=1
          [ "${{ steps.run_openai.outcome }}" = "failure" ] && failed=1

          if [ $failed -ne 0 ]; then
            echo "One or more feed runs failed after retries."
            echo "## ❌ Workflow failed" >> "$GITHUB_STEP_SUMMARY"
            echo "At least one feed failed even after 3 attempts." >> "$GITHUB_STEP_SUMMARY"
            echo "- run_youtube: ${{ steps.run_youtube.outcome }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- run_openai: ${{ steps.run_openai.outcome }}" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::One or more feed runs failed after 3 attempts."
            exit 1
          fi

          echo "## ✅ Workflow succeeded" >> "$GITHUB_STEP_SUMMARY"
          echo "All feed runs succeeded within up to 3 attempts." >> "$GITHUB_STEP_SUMMARY"
          echo "All feed runs succeeded."
